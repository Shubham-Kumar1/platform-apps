apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
data:
  pgbouncer.ini: |
    [databases]
    eventhub_central = host={{ .Values.postgresql.host }} port={{ .Values.postgresql.port }} dbname={{ .Values.postgresql.database }}

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = {{ .Values.pooling.poolMode }}
    default_pool_size = {{ .Values.pooling.defaultPoolSize }}
    max_client_conn = {{ .Values.pooling.maxClientConn }}
    max_db_connections = {{ .Values.pooling.maxDbConnections }}
    log_connections = 1
    log_disconnections = 1
    stats_period = 60

  userlist.txt: |
    "{{ .Values.postgresql.username }}" "{{ .Values.postgresql.password }}"
