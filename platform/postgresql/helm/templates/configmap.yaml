apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
data:
  postgresql.conf: |
    listen_addresses = '*'
    max_connections = 200
    shared_buffers = 256MB
    effective_cache_size = 512MB
    work_mem = 4MB
    maintenance_work_mem = 64MB
    wal_level = replica
    max_wal_senders = 5
    log_statement = 'mod'
    log_connections = on
    log_disconnections = on

  init.sql: |
    -- Central DB schema: users, organizations, roles
    CREATE TABLE IF NOT EXISTS organizations (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        name VARCHAR(255) NOT NULL,
        slug VARCHAR(100) UNIQUE NOT NULL,
        plan_tier VARCHAR(50) NOT NULL DEFAULT 'free',
        max_events INTEGER NOT NULL DEFAULT 10,
        max_members INTEGER NOT NULL DEFAULT 5,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS users (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        email VARCHAR(255) UNIQUE NOT NULL,
        name VARCHAR(255) NOT NULL,
        password_hash VARCHAR(255) NOT NULL,
        avatar_url TEXT,
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS org_memberships (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        org_id UUID NOT NULL REFERENCES organizations(id) ON DELETE CASCADE,
        role VARCHAR(50) NOT NULL DEFAULT 'member',
        joined_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        UNIQUE(user_id, org_id)
    );

    CREATE TABLE IF NOT EXISTS api_keys (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        org_id UUID NOT NULL REFERENCES organizations(id) ON DELETE CASCADE,
        key_hash VARCHAR(255) NOT NULL,
        name VARCHAR(100) NOT NULL,
        scopes TEXT[] DEFAULT '{}',
        expires_at TIMESTAMP WITH TIME ZONE,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );

    -- Indexes
    CREATE INDEX IF NOT EXISTS idx_users_email ON users(email);
    CREATE INDEX IF NOT EXISTS idx_memberships_user ON org_memberships(user_id);
    CREATE INDEX IF NOT EXISTS idx_memberships_org ON org_memberships(org_id);
    CREATE INDEX IF NOT EXISTS idx_apikeys_org ON api_keys(org_id);

    -- Seed data
    INSERT INTO organizations (id, name, slug, plan_tier, max_events, max_members) VALUES
        ('a0000000-0000-0000-0000-000000000001', 'Acme Corp', 'acme', 'pro', 100, 50),
        ('a0000000-0000-0000-0000-000000000002', 'Stark Industries', 'stark', 'enterprise', 1000, 500)
    ON CONFLICT DO NOTHING;

    INSERT INTO users (id, email, name, password_hash) VALUES
        ('u0000000-0000-0000-0000-000000000001', 'alice@acme.com', 'Alice Johnson', '$2a$10$example_hash_alice'),
        ('u0000000-0000-0000-0000-000000000002', 'bob@stark.com', 'Bob Smith', '$2a$10$example_hash_bob')
    ON CONFLICT DO NOTHING;

    INSERT INTO org_memberships (user_id, org_id, role) VALUES
        ('u0000000-0000-0000-0000-000000000001', 'a0000000-0000-0000-0000-000000000001', 'admin'),
        ('u0000000-0000-0000-0000-000000000002', 'a0000000-0000-0000-0000-000000000002', 'admin')
    ON CONFLICT DO NOTHING;
