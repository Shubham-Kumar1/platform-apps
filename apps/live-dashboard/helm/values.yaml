replicaCount: 2
image:
  repository: localhost:5000/live-dashboard
  tag: latest
service:
  type: ClusterIP
  port: 3000
ingress:
  enabled: true
  className: nginx
  host: dashboard.eventhub.local
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
mongodb:
  image: mongo:7.0
  storageSize: 10Gi
centralDb:
  secretName: central-db-credentials
